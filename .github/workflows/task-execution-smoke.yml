name: Task Execution Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/task-execution-smoke.yml"
      - "apps/web/**"
      - "packages/backend/**"
      - "packages/cli/**"
      - "scripts/task-execution-smoke*"
      - "tests/e2e/**"
      - "package.json"
      - "bun.lock"
      - "playwright.config.ts"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/task-execution-smoke.yml"
      - "apps/web/**"
      - "packages/backend/**"
      - "packages/cli/**"
      - "scripts/task-execution-smoke*"
      - "tests/e2e/**"
      - "package.json"
      - "bun.lock"
      - "playwright.config.ts"

jobs:
  task-execution-smoke:
    name: Full Task Execution Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      VITE_CONVEX_URL: ${{ secrets.E2E_CONVEX_URL }}
      VITE_CONVEX_SITE_URL: ${{ secrets.E2E_CONVEX_SITE_URL }}
      E2E_WEB_PORT: "2101"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install chromium --with-deps

      - name: Run full Task execution smoke
        run: bun run test:task-execution-smoke:full

      - name: Publish smoke summary
        if: always()
        run: |
          if [ -f test-results/task-execution-smoke.md ]; then
            cat test-results/task-execution-smoke.md >> "$GITHUB_STEP_SUMMARY"
          else
            printf 'Task execution smoke report was not generated.\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task-execution-smoke-report
          path: |
            test-results/task-execution-smoke.json
            test-results/task-execution-smoke.md
          if-no-files-found: ignore
