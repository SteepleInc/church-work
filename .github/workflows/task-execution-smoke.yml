name: Task Execution Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/task-execution-smoke.yml"
      - "apps/web/**"
      - "packages/backend/**"
      - "packages/cli/**"
      - "packages/ui/**"
      - "scripts/task-execution-smoke*.ts"
      - "tests/e2e/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/task-execution-smoke.yml"
      - "apps/web/**"
      - "packages/backend/**"
      - "packages/cli/**"
      - "packages/ui/**"
      - "scripts/task-execution-smoke*.ts"
      - "tests/e2e/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"

jobs:
  task-execution-smoke:
    name: Full smoke gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_CONVEX_URL: ${{ secrets.E2E_CONVEX_URL }}
      VITE_CONVEX_SITE_URL: ${{ secrets.E2E_CONVEX_SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run full Task execution smoke
        run: bun run test:task-execution-smoke:full

      - name: Publish smoke report summary
        if: always() && hashFiles('test-results/task-execution-smoke.md') != ''
        run: |
          cat test-results/task-execution-smoke.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload smoke reports
        if: always() && hashFiles('test-results/task-execution-smoke.*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: task-execution-smoke-report
          path: |
            test-results/task-execution-smoke.json
            test-results/task-execution-smoke.md
